<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>ICG – Lector de Códigos de Barras</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<header class="app-header">
  <div class="header-inner">
    <span class="header-icon">🔍</span>
    <div>
      <h1>Lector de Códigos de Barras</h1>
      <p>ICG – Logística · Registro y control de productos</p>
    </div>
  </div>
</header>

<nav class="main-nav">
  <a href="/"        class="nav-link {{ 'active' if active == 'scanner' }}">📷 Escanear</a>
  <a href="/records" class="nav-link {{ 'active' if active == 'records' }}">📋 Registros</a>
</nav>

<main class="main-content">
  <div id="toast-container"></div>
  {% block content %}{% endblock %}
</main>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
